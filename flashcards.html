  {s:"Art contemporain",q:"Qui est Wolfgang Laib ?",a:"🇩🇪 Artiste allemand (1950)\nMédium : installation, sculpture\nRécolte du pollen de fleurs (œuvre = le pollen)\nOeuvre clé : Milkstone (dalle de marbre + lait)\nSpiritualité, nature, méditation\nCollecte le pollen lui-même pendant des mois",img:"Wolfgang Laib pollen installation",wiki:"Wolfgang_Laib"},
  {s:"Art contemporain",q:"Qui est Arnulf Rainer ?",a:"🇦🇹 Peintre autrichien (1929)\nMédium : peinture, photographie retouchée\nSurpeint photos et œuvres — gestes violents\nOeuvre clé : Face Farces (grimaces surpeintes)\nPrécurseur de l'actionnisme viennois\nRecouvre pour révéler",img:"Arnulf Rainer Face Farces painting",wiki:"Arnulf_Rainer"},
  {s:"Art contemporain",q:"Qui est Mirosław Bałka ?",a:"🇵🇱 Sculpteur polonais (1958)\nMédium : sculpture, installation, vidéo\nMémoire de la Shoah et histoire polonaise\nOeuvre clé : How It Is (container noir, Tate Turbine Hall 2009)\nLe spectateur entre dans l'obscurité totale\nDimensions liées à son propre corps",img:"Miroslaw Balka How It Is Tate",wiki:"Miros%C5%82aw_Ba%C5%82ka"},
  {s:"Art contemporain",q:"Qui est Olga de Amaral ?",a:"🇨🇴 Artiste colombienne (1932)\nMédium : textile, fibre\nTapisseries monumentales en or, gesso et fibre\nOeuvre clé : Alquimia (murs textiles dorés)\nPionnière de l'art textile en Amérique latine\nMêle artisanat précolombien et art contemporain",img:"Olga de Amaral textile fiber art",wiki:"Olga_de_Amaral"},
  {s:"Art contemporain",q:"Qui est Sheila Hicks ?",a:"🇺🇸🇫🇷 Artiste américaine basée à Paris (1934)\nMédium : textile, sculpture fibre\nSculptures textiles colorées monumentales\nOeuvre clé : Pillar of Inquiry (colonnes de fibres)\nFormée chez Anni Albers au Black Mountain\nVit à Paris depuis 1964",img:"Sheila Hicks textile sculpture",wiki:"Sheila_Hicks"},
  {s:"Art contemporain",q:"Qui est Annette Kelm ?",a:"🇩🇪 Photographe allemande (1975)\nMédium : photographie\nNatures mortes conceptuelles, répétitions, motifs\nOeuvre clé : photos de tissus hawaïens, bouquets\nFrontière entre image documentaire et abstraite\nPrécision formelle, humour discret",img:"Annette Kelm photography",wiki:"Annette_Kelm"},
  {s:"Art contemporain",q:"Qui est Liam Gillick ?",a:"🇬🇧 Artiste britannique (1964)\nMédium : installation, sculpture, texte\nStructures colorées en Plexiglas et aluminium\nOeuvre clé : Discussion Island (plateformes de discussion)\nArt relationnel — repense l'espace social\nReprésente l'Allemagne à Venise 2009",img:"Liam Gillick installation plexiglas",wiki:"Liam_Gillick"},
  {s:"Art contemporain",q:"Qui est Sarah Lucas ?",a:"🇬🇧 Artiste britannique (1962), YBA\nMédium : sculpture, photographie\nHumour cru, objets du quotidien, sexualité\nOeuvre clé : Two Fried Eggs and a Kebab\nCollants rembourrés, meubles, cigarettes\nProvocatrice féministe",img:"Sarah Lucas Two Fried Eggs Kebab",wiki:"Sarah_Lucas"},
  {s:"Art contemporain",q:"Qui est Sean Scully ?",a:"🇮🇪🇺🇸 Peintre irlando-américain (1945)\nMédium : peinture\nBandes horizontales et verticales de couleurs riches\nOeuvre clé : Wall of Light (série)\nAbstraction émotionnelle inspirée par la lumière\nNé à Dublin, élevé à Londres",img:"Sean Scully Wall of Light painting",wiki:"Sean_Scully"},
  {s:"Art contemporain",q:"Qui est Christian Marclay ?",a:"🇺🇸🇨🇭 Artiste américano-suisse (1955)\nMédium : vidéo, son, installation\nOeuvre clé : The Clock (vidéo de 24h, montage de films)\nChaque minute = un extrait de film montrant l'heure réelle\nLion d'Or Venise 2011\nPionnier du sampling visuel et sonore",img:"Christian Marclay The Clock video",wiki:"Christian_Marclay"},

  // Art contemporain — Asie / Océanie
  {s:"Art contemporain",q:"Qui est Tehching Hsieh ?",a:"🇹🇼 Artiste taïwanais (1950)\nMédium : performance\n5 performances d'un an chacune (1978-1986)\nOeuvre clé : Time Clock Piece (pointer chaque heure pendant 1 an)\nA vécu dans une cage, dehors, attaché à une autre personne\nPerformance comme mode de vie radical",img:"Tehching Hsieh Time Clock Piece",wiki:"Tehching_Hsieh"},
  {s:"Art contemporain",q:"Qui est Tatsuo Miyajima ?",a:"🇯🇵 Artiste japonais (1957)\nMédium : installation, sculpture (LED)\nCompteurs LED qui défilent de 1 à 9 (jamais 0)\nOeuvre clé : Sea of Time (LEDs dans une piscine noire)\nBouddhisme, cycle de vie, impermanence\nDevise : Keep Changing, Connect, Go On",img:"Tatsuo Miyajima LED installation",wiki:"Tatsuo_Miyajima"},
  {s:"Art contemporain",q:"Qui est Bharti Kher ?",a:"🇮🇳🇬🇧 Artiste indo-britannique (1969)\nMédium : sculpture, installation\nUtilise des bindis (points décoratifs indiens)\nOeuvre clé : The Skin Speaks a Language Not Its Own (éléphant)\nÉléphant couvert de bindis, taille réelle\nVit et travaille à New Delhi",img:"Bharti Kher bindi elephant sculpture",wiki:"Bharti_Kher"},
  {s:"Art contemporain",q:"Qui est Ai Xuan ?",a:"🇨🇳 Peintre chinois (1947)\nMédium : peinture (réalisme)\nPaysages enneigés du Tibet, portraits mélancoliques\nOeuvre clé : portraits de jeunes Tibétaines\nHyperéalisme poétique et contemplatif\nFormé à l'Académie centrale des Beaux-Arts de Pékin",img:"Ai Xuan Tibet painting",wiki:"Ai_Xuan"},
  {s:"Art contemporain",q:"Qui est Zeng Fanzhi ?",a:"🇨🇳 Peintre chinois (1964)\nMédium : peinture\nPortraits avec des masques blancs grotesques\nOeuvre clé : The Last Supper (23,3 M$, record Asie 2013)\nExpressionnisme influencé par Bacon et de Kooning\nUn des artistes chinois les plus chers",img:"Zeng Fanzhi The Last Supper painting",wiki:"Zeng_Fanzhi"},
  {s:"Art contemporain",q:"Qui est Chiharu Shiota ?",a:"🇯🇵 Artiste japonaise (1972)\nMédium : installation (fils)\nInstallations de fils noirs ou rouges envahissant l'espace\nOeuvre clé : The Key in the Hand (Venise 2015, clés suspendues)\nMémoire, absence, connexion\nVit à Berlin",img:"Chiharu Shiota Key in Hand Venice",wiki:"Chiharu_Shiota"},
  {s:"Art contemporain",q:"Qui est Kimsooja ?",a:"🇰🇷 Artiste coréenne (1957)\nMédium : vidéo, performance, installation textile\nBottaris (balluchons de tissus coréens)\nOeuvre clé : A Needle Woman (immobile dans des foules)\nMéditation, migration, féminité\nArt comme acte de couture du monde",img:"Kimsooja Needle Woman performance",wiki:"Kimsooja"},
  {s:"Art contemporain",q:"Qui est Fiona Hall ?",a:"🇦🇺 Artiste australienne (1953)\nMédium : sculpture, installation\nObjets du quotidien transformés (conserves, billets)\nOeuvre clé : Wrong Way Time (Biennale de Venise 2015)\nNature, commerce, colonialisme\nReprésente l'Australie à Venise",img:"Fiona Hall Wrong Way Time Venice",wiki:"Fiona_Hall"},

  // Art contemporain — Afrique / Moyen-Orient
  {s:"Art contemporain",q:"Qui est Julie Mehrétu ?",a:"🇪🇷🇺🇸 Peintre américano-érythréenne (1970)\nMédium : peinture, dessin\nGrandes abstractions avec cartographie et architecture\nOeuvre clé : Stadia II\nSuperposition de couches = flux migratoires\nUne des peintres les plus cotées au monde",img:"Julie Mehretu Stadia painting",wiki:"Julie_Mehretu"},
  {s:"Art contemporain",q:"Qui est Hassan Hajjaj ?",a:"🇲🇦🇬🇧 Artiste maroco-britannique (1961)\nMédium : photographie, installation, design\nPortraits pop dans des cadres de boîtes de conserve\nOeuvre clé : Kesh Angels (motardes en voile)\nSurnommé 'Andy Warhol du Maroc'\nMêle pop art et culture nord-africaine",img:"Hassan Hajjaj Kesh Angels photograph",wiki:"Hassan_Hajjaj"},
  {s:"Art contemporain",q:"Qui est Abdoulaye Konaté ?",a:"🇲🇱 Artiste malien (1953)\nMédium : textile, installation\nInstallations textiles monumentales en bazin teint\nOeuvre clé : compositions murales en tissu (bleu, rouge)\nThèmes : sida, guerre, environnement\nDirecteur du Conservatoire de Bamako",img:"Abdoulaye Konate textile installation",wiki:"Abdoulaye_Konat%C3%A9"},
  {s:"Art contemporain",q:"Qui est Barthélémy Toguo ?",a:"🇨🇲 Artiste camerounais (1967)\nMédium : peinture, sculpture, installation, performance\nTampons géants, aquarelles monumentales\nOeuvre clé : Road to Exile (tampons à cachets géants)\nMigration, frontières, pouvoir\nVit entre Paris et Bandjoun (Cameroun)",img:"Barthelemy Toguo Road to Exile stamps",wiki:"Barth%C3%A9l%C3%A9my_Toguo"},
  {s:"Art contemporain",q:"Qui est Emeka Ogboh ?",a:"🇳🇬 Artiste nigérian (1977)\nMédium : installation sonore, sculpture\nInstallations sonores immersives\nOeuvre clé : Lagos Soundscape (ambiances de Lagos)\nBière Documenta (bière artisanale comme art)\nDocumenta 14, Biennale de Venise",img:"Emeka Ogboh sound installation",wiki:"Emeka_Ogboh"},
  {s:"Art contemporain",q:"Qui est Michael Armitage ?",a:"🇰🇪🇬🇧 Peintre kenyano-britannique (1984)\nMédium : peinture sur tissu lubugo\nScènes oniriques de la vie est-africaine\nOeuvre clé : peintures sur écorce de figuier ougandais\nPolitique, violence, paysage\nStar montante — exposé à la Royal Academy",img:"Michael Armitage painting lubugo",wiki:"Michael_Armitage"},
  {s:"Art contemporain",q:"Qui est Latifa Echakhch ?",a:"🇲🇦🇨🇭 Artiste maroco-suisse (1974)\nMédium : installation, sculpture\nInstallations poétiques avec objets chargés d'histoire\nOeuvre clé : The Concert (Biennale de Venise 2022)\nEncre, verres brisés, drapeaux\nReprésente la Suisse à Venise 2022",img:"Latifa Echakhch The Concert Venice",wiki:"Latifa_Echakhch"},

  // Photographie — suppléments
  {s:"Photographie",q:"Qui est August Sander ?",a:"🇩🇪 Photographe allemand (1876-1964)\nMédium : photographie documentaire\nPortraits systématiques de la société allemande\nOeuvre clé : People of the 20th Century (600+ portraits)\nClassification sociale par le portrait\nŒuvre confisquée par les nazis",img:"August Sander People 20th Century portrait",wiki:"August_Sander"},
  {s:"Photographie",q:"Qui est Eugène Atget ?",a:"🇫🇷 Photographe français (1857-1927)\nMédium : photographie documentaire\nA documenté le vieux Paris pendant 30 ans\nOeuvre clé : rues désertes de Paris à l'aube\nRedécouvert par Berenice Abbott\nPrécurseur de la photographie moderne",img:"Eugene Atget Paris photography",wiki:"Eug%C3%A8ne_Atget"},
  {s:"Photographie",q:"Qui est Edward Weston ?",a:"🇺🇸 Photographe américain (1886-1958)\nMédium : photographie (grand format)\nNus, coquillages, poivrons — formes pures\nOeuvre clé : Pepper No. 30 (1930)\nCofondateur du groupe f/64\nPrécision absolue, netteté totale",img:"Edward Weston Pepper No 30",wiki:"Edward_Weston"},
  {s:"Photographie",q:"Qui est Ansel Adams ?",a:"🇺🇸 Photographe américain (1902-1984)\nMédium : photographie N&B (paysage)\nPaysages grandioses de l'Ouest américain\nOeuvre clé : Moonrise, Hernandez, New Mexico (1941)\nInventeur du Zone System (exposition précise)\nMilitant écologiste — parcs nationaux",img:"Ansel Adams Moonrise Hernandez",wiki:"Ansel_Adams"},
  {s:"Photographie",q:"Qui est Irving Penn ?",a:"🇺🇸 Photographe américain (1917-2009)\nMédium : photographie de mode et portrait\nPortraits sur fond neutre, natures mortes\nOeuvre clé : portraits en coin (Truman Capote, Picasso)\nVogue pendant 60 ans\nÉlégance absolue, simplicité radicale",img:"Irving Penn corner portrait photography",wiki:"Irving_Penn"},
  {s:"Photographie",q:"Qui est Lee Friedlander ?",a:"🇺🇸 Photographe américain (1934)\nMédium : photographie de rue\nReflets, ombres, auto-portraits dans le paysage urbain\nOeuvre clé : autoportraits dans les vitrines\nComplexité visuelle du quotidien américain\nInfluence majeure sur la photo contemporaine",img:"Lee Friedlander self portrait photography",wiki:"Lee_Friedlander"},
  {s:"Photographie",q:"Qui est Garry Winogrand ?",a:"🇺🇸 Photographe américain (1928-1984)\nMédium : photographie de rue\nÉnergie brute de la vie américaine\nOeuvre clé : photos de rue à New York\nA laissé 2500 pellicules non développées à sa mort\nLe plus prolifique des street photographers",img:"Garry Winogrand street photography",wiki:"Garry_Winogrand"},
  {s:"Photographie",q:"Qui est Anders Petersen ?",a:"🇸🇪 Photographe suédois (1944)\nMédium : photographie N&B\nIntime, brut, émotionnel — monde de la nuit\nOeuvre clé : Café Lehmitz (bar de Hambourg, 1978)\nVie nocturne, marginaux, vulnérabilité\nA influencé toute la photo scandinave",img:"Anders Petersen Cafe Lehmitz",wiki:"Anders_Petersen_(photographer)"},
  {s:"Photographie",q:"Qui est Paolo Roversi ?",a:"🇮🇹🇫🇷 Photographe italien basé à Paris (1947)\nMédium : photographie de mode\nPortraits éthérés au Polaroid grand format\nOeuvre clé : portraits de mode (Dior, Comme des Garçons)\nLumière douce, poses picturales\nUn des plus grands photographes de mode vivants",img:"Paolo Roversi fashion photography",wiki:"Paolo_Roversi"},
  {s:"Photographie",q:"Qui est Peter Lindbergh ?",a:"🇩🇪 Photographe allemand (1944-2019)\nMédium : photographie de mode N&B\nA lancé l'ère des supermodels (Naomi, Linda, Cindy)\nOeuvre clé : couverture Vogue UK janvier 1990\nRefusait la retouche — beauté naturelle\nPremier calendrier Pirelli sans retouches (2017)",img:"Peter Lindbergh supermodels Vogue",wiki:"Peter_Lindbergh"},
  {s:"Photographie",q:"Qui est Joel Meyerowitz ?",a:"🇺🇸 Photographe américain (1938)\nMédium : photographie couleur\nPionnier de la photo de rue en couleur\nOeuvre clé : Cape Light (lumière du Cap Cod)\nA documenté Ground Zero après le 11 septembre\nGrand format et petits instants",img:"Joel Meyerowitz Cape Light photography",wiki:"Joel_Meyerowitz"},
  {s:"Photographie",q:"Qui est Graciela Iturbide ?",a:"🇲🇽 Photographe mexicaine (1942)\nMédium : photographie N&B\nMexique profond : rituels, femmes, paysages\nOeuvre clé : Nuestra Señora de las Iguanas (1979)\nFemme zapotèque avec iguanes sur la tête\nHasselblad Award 2008",img:"Graciela Iturbide Nuestra Señora Iguanas",wiki:"Graciela_Iturbide"},
  {s:"Photographie",q:"Qui est Pieter Hugo ?",a:"🇿🇦 Photographe sud-africain (1976)\nMédium : photographie portrait\nPortraits frontaux, Afrique post-coloniale\nOeuvre clé : The Hyena & Other Men (dresseurs de hyènes, Nigeria)\nBeauté et tension dans les marges\nRegard sans exotisme",img:"Pieter Hugo Hyena Men Nigeria",wiki:"Pieter_Hugo"},

  // Mouvements artistiques — suppléments
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Néo-expressionnisme ?",a:"Années 1980, retour à la peinture figurative\nRéaction au minimalisme et conceptualisme\nBaselitz, Kiefer, Schnabel, Clemente, Lüpertz\nGestes violents, grandes toiles, émotion brute\nBoom du marché de l'art dans les années 80",img:"Julian Schnabel plate painting neo-expressionism",wiki:"N%C3%A9o-expressionnisme"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Suprématisme ?",a:"Russie 1915, fondé par Kasimir Malevitch\nFormes géométriques pures sur fond blanc\nOeuvre fondatrice : Carré noir sur fond blanc (1915)\nRecherche du 'sentiment pur' au-delà de l'objet\nA influencé le Bauhaus et le design moderne",img:"Malevich Black Square suprematism",wiki:"Supr%C3%A9matisme"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Symbolisme ?",a:"Europe, fin XIXe siècle (~1886)\nRejet du réalisme — rêve, mystère, mythe\nMoreau, Redon, Klimt, Puvis de Chavannes\nOeuvre clé : Klimt, Le Baiser (1907-08)\nPont entre romantisme et art moderne",img:"Gustav Klimt The Kiss symbolism",wiki:"Symbolisme_(art)"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que l'Art déco ?",a:"Années 1920-30, apogée Expo Paris 1925\nGéométrie, luxe, matériaux précieux\nTamara de Lempicka, Cassandre, Lalique\nArchitecture : Chrysler Building (NYC)\nFusion art + artisanat + industrie de luxe",img:"Chrysler Building Art Deco New York",wiki:"Art_d%C3%A9co"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que l'Art nouveau ?",a:"Europe ~1890-1910, aussi appelé Jugendstil\nLignes courbes organiques inspirées de la nature\nMucha, Guimard (métro Paris), Gaudí, Horta\nOeuvre clé : entrées du métro parisien (Guimard)\nArchitecture, affiche, mobilier, bijoux",img:"Hector Guimard metro Paris Art Nouveau",wiki:"Art_nouveau"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Photréalisme ?",a:"USA, fin des années 1960\nPeinture qui imite la photographie à la perfection\nClose (portraits géants), Estes (reflets urbains)\nTravail à partir de photos projetées sur la toile\nQuestionne la nature de l'image et de la réalité",img:"Chuck Close self portrait photorealism",wiki:"Photor%C3%A9alisme"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Romantisme ?",a:"Europe, fin XVIIIe - mi XIXe siècle\nÉmotion, sublime, nature sauvage, individu\nDelacroix, Friedrich, Turner, Géricault\nOeuvre clé : Le Radeau de la Méduse (Géricault, 1819)\nRéaction aux Lumières et au néoclassicisme",img:"Gericault Raft of Medusa romanticism",wiki:"Romantisme"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Réalisme ?",a:"France, milieu XIXe siècle (~1850)\nReprésenter le monde tel qu'il est, sans idéaliser\nCourbet, Millet, Daumier\nOeuvre clé : Courbet, Un enterrement à Ornans (1849-50)\nCourbet : 'Montrez-moi un ange et je le peindrai'\nPremier art 'politique' et social",img:"Courbet Un enterrement a Ornans realism",wiki:"R%C3%A9alisme_(peinture)"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Post-impressionnisme ?",a:"France ~1886-1910, après l'impressionnisme\nChaque artiste invente son propre langage\nCézanne, Van Gogh, Gauguin, Seurat\nOeuvre clé : Cézanne, Les Grandes Baigneuses\nA ouvert la voie au cubisme et à l'art moderne",img:"Cezanne Les Grandes Baigneuses post-impressionism",wiki:"Postimpressionnisme"},

  // ── ENCORE PLUS D'ARTISTES ──

  // Grands maîtres modernes
  {s:"Art contemporain",q:"Qui est Pablo Picasso ?",a:"🇪🇸 Peintre espagnol (1881-1973)\nMédium : peinture, sculpture, céramique, gravure\nCofondateur du cubisme avec Braque\nOeuvre clé : Guernica (1937, anti-guerre)\nPériodes bleue, rose, cubiste, surréaliste\nArtiste le plus prolifique du XXe siècle",img:"Pablo Picasso Guernica painting",wiki:"Pablo_Picasso"},
  {s:"Art contemporain",q:"Qui est Henri Matisse ?",a:"🇫🇷 Peintre français (1869-1954)\nMédium : peinture, découpage, sculpture\nLeader du fauvisme — couleur pure et joie\nOeuvre clé : La Danse (1910)\nGouaches découpées en fin de vie (Jazz, 1947)\nRival et ami de Picasso",img:"Henri Matisse La Danse painting",wiki:"Henri_Matisse"},
  {s:"Art contemporain",q:"Qui est Salvador Dalí ?",a:"🇪🇸 Peintre espagnol (1904-1989)\nMédium : peinture, film, sculpture\nMaître du surréalisme — méthode paranoïaque-critique\nOeuvre clé : La Persistance de la mémoire (montres molles)\nPersonnage extravagant, moustache iconique\nMusée-théâtre à Figueres",img:"Salvador Dali Persistence of Memory",wiki:"Salvador_Dal%C3%AD"},
  {s:"Art contemporain",q:"Qui est René Magritte ?",a:"🇧🇪 Peintre belge (1898-1967)\nMédium : peinture\nSurréalisme : images trompeuses, logique absurde\nOeuvre clé : La Trahison des images ('Ceci n'est pas une pipe')\nHommes au chapeau melon, ciel dans les visages\nA influencé le Pop Art et la pub",img:"Rene Magritte Treachery of Images pipe",wiki:"Ren%C3%A9_Magritte"},
  {s:"Art contemporain",q:"Qui est Wassily Kandinsky ?",a:"🇷🇺🇩🇪 Peintre russe-allemand (1866-1944)\nMédium : peinture, gravure\nPionnier de l'abstraction (1re aquarelle abstraite, 1910)\nOeuvre clé : Composition VII (1913)\nThéoricien : Du spirituel dans l'art (1911)\nProfesseur au Bauhaus",img:"Wassily Kandinsky Composition VII",wiki:"Vassily_Kandinsky"},
  {s:"Art contemporain",q:"Qui est Piet Mondrian ?",a:"🇳🇱 Peintre néerlandais (1872-1944)\nMédium : peinture\nGrilles de lignes noires, couleurs primaires\nOeuvre clé : Composition en rouge, bleu et jaune\nNéoplasticisme — recherche de l'harmonie universelle\nA influencé l'architecture et le design",img:"Piet Mondrian Composition Red Blue Yellow",wiki:"Piet_Mondrian"},
  {s:"Art contemporain",q:"Qui est Paul Klee ?",a:"🇨🇭🇩🇪 Peintre suisso-allemand (1879-1940)\nMédium : peinture, aquarelle, dessin\nPoésie visuelle, couleur, lignes enfantines\nOeuvre clé : Senecio (1922, tête géométrique)\nProfesseur au Bauhaus\n'L'art ne reproduit pas le visible, il rend visible'",img:"Paul Klee Senecio painting",wiki:"Paul_Klee"},
  {s:"Art contemporain",q:"Qui est Joan Miró ?",a:"🇪🇸 Peintre espagnol (1893-1983)\nMédium : peinture, sculpture, céramique\nFormes biomorphiques, couleurs vives, étoiles, oiseaux\nOeuvre clé : La Ferme (1921-22)\nFondation Miró à Barcelone\n'L'assassinat de la peinture' — rejeter la tradition",img:"Joan Miro painting stars",wiki:"Joan_Mir%C3%B3"},
  {s:"Art contemporain",q:"Qui est Constantin Brancusi ?",a:"🇷🇴🇫🇷 Sculpteur roumain-français (1876-1957)\nMédium : sculpture (marbre, bronze, bois)\nFormes épurées, essentielles, polies\nOeuvre clé : L'Oiseau dans l'espace (1923)\nPère de la sculpture moderne\nAtelier reconstitué à Beaubourg",img:"Brancusi Bird in Space sculpture",wiki:"Constantin_Brancusi"},
  {s:"Art contemporain",q:"Qui est Henry Moore ?",a:"🇬🇧 Sculpteur britannique (1898-1986)\nMédium : sculpture (bronze, pierre)\nFormes organiques, figures allongées percées de trous\nOeuvre clé : Reclining Figure (femmes couchées)\nSculptures monumentales dans le monde entier\nPlus grand sculpteur britannique du XXe",img:"Henry Moore Reclining Figure sculpture",wiki:"Henry_Moore"},
  {s:"Art contemporain",q:"Qui est Egon Schiele ?",a:"🇦🇹 Peintre autrichien (1890-1918)\nMédium : peinture, dessin\nCorps tordus, sexualité crue, autoportraits torturés\nOeuvre clé : L'Étreinte (1917)\nProtégé de Klimt, emprisonné pour 'immoralité'\nMort de la grippe espagnole à 28 ans",img:"Egon Schiele The Embrace painting",wiki:"Egon_Schiele"},
  {s:"Art contemporain",q:"Qui est Gustav Klimt ?",a:"🇦🇹 Peintre autrichien (1862-1918)\nMédium : peinture, dessin\nOr, ornements, érotisme — Sécession viennoise\nOeuvre clé : Le Baiser (1907-08)\nPortrait d'Adele Bloch-Bauer vendu 135 M$ (2006)\nFusion art + artisanat + décoration",img:"Gustav Klimt The Kiss painting",wiki:"Gustav_Klimt"},
  {s:"Art contemporain",q:"Qui est Edvard Munch ?",a:"🇳🇴 Peintre norvégien (1863-1944)\nMédium : peinture, gravure\nAngoisse, solitude, amour, mort\nOeuvre clé : Le Cri (1893, vendu 119,9 M$ en 2012)\nPrécurseur de l'expressionnisme\n'La maladie, la folie et la mort étaient les anges de mon berceau'",img:"Edvard Munch The Scream painting",wiki:"Edvard_Munch"},

  // Art contemporain — artistes manquants importants
  {s:"Art contemporain",q:"Qui est Marina Abramović et Ulay ?",a:"🇷🇸🇩🇪 Duo serbo-allemand (1976-1988)\nMédium : performance\n12 ans de performances en duo\nOeuvre clé : The Lovers (marche de la Grande Muraille, 1988)\nChacun a marché 2500 km pour se séparer au milieu\nRetrouvailler émouvantes à The Artist is Present (2010)",img:"Marina Abramovic Ulay Great Wall China",wiki:"Ulay"},
  {s:"Art contemporain",q:"Qui est Zanele Muholi ?",a:"🇿🇦 Artiste visuel·le sud-africain·e (1972)\nMédium : photographie\nDocumente la communauté LGBTQ+ noire d'Afrique du Sud\nOeuvre clé : Somnyama Ngonyama (autoportraits)\nUtilise objets du quotidien comme accessoires\nActiviste visuel·le — genre non-binaire",img:"Zanele Muholi Somnyama Ngonyama portrait",wiki:"Zanele_Muholi"},
  {s:"Art contemporain",q:"Qui est Arman ?",a:"🇫🇷🇺🇸 Artiste franco-américain (1928-2005)\nMédium : sculpture, assemblage\nAccumulations d'objets identiques (montres, voitures)\nOeuvre clé : Long Term Parking (60 voitures dans béton)\nNouveau Réalisme — ami d'Yves Klein\nPoubelles, colères (objets fracassés)",img:"Arman Long Term Parking sculpture",wiki:"Arman"},
  {s:"Art contemporain",q:"Qui est Jean Tinguely ?",a:"🇨🇭 Sculpteur suisse (1925-1991)\nMédium : sculpture cinétique\nMachines absurdes, bruyantes, autodestructrices\nOeuvre clé : Homage to New York (s'autodétruit au MoMA, 1960)\nNouveau Réalisme — compagnon de Niki de Saint Phalle\nFontaine Stravinsky (Pompidou)",img:"Jean Tinguely sculpture machine kinetic",wiki:"Jean_Tinguely"},
  {s:"Art contemporain",q:"Qui est Ben Vautier ?",a:"🇫🇷🇮🇹 Artiste franco-italien (1935-2024)\nMédium : peinture, écriture, performance\nÉcritures blanches sur fond noir ('Ben')\nOeuvre clé : 'L'art est inutile' (écriture-tableau)\nFluxus — art = tout, tout = art\nProvocateur philosophe niçois",img:"Ben Vautier art ecriture",wiki:"Ben_(artiste)"},
  {s:"Art contemporain",q:"Qui est Robert Morris ?",a:"🇺🇸 Artiste américain (1931-2018)\nMédium : sculpture, installation, performance\nMinimalisme — formes géométriques en contreplaqué\nOeuvre clé : Untitled (L-Beams, 1965)\nA aussi fait du Land Art et du Process Art\nThéoricien majeur de l'art minimal",img:"Robert Morris L-Beams sculpture",wiki:"Robert_Morris_(artiste)"},
  {s:"Art contemporain",q:"Qui est Eva Hesse ?",a:"🇩🇪🇺🇸 Artiste germano-américaine (1936-1970)\nMédium : sculpture (latex, fibre de verre)\nFormes organiques, matériaux souples et fragiles\nOeuvre clé : Hang Up (cadre avec fil en boucle)\nPost-minimalisme — émotion dans la matière\nMorte à 34 ans d'une tumeur au cerveau",img:"Eva Hesse Hang Up sculpture",wiki:"Eva_Hesse"},
  {s:"Art contemporain",q:"Qui est Felix Gonzalez-Torres ?",a:"🇨🇺🇺🇸 Artiste cubano-américain (1957-1996)\nMédium : installation, sculpture\nTas de bonbons, rideaux de perles, ampoules\nOeuvre clé : Untitled (Portrait of Ross in L.A.) — bonbons = poids de son compagnon\nArt relationnel — le spectateur prend un bonbon\nMort du sida à 38 ans",img:"Felix Gonzalez-Torres candy installation",wiki:"Felix_Gonzalez-Torres"},
  {s:"Art contemporain",q:"Qui est Donald Judd ?",a:"🇺🇸 Artiste américain (1928-1994)\nMédium : sculpture (boîtes, métal, Plexiglas)\nBoîtes murales en aluminium et Plexiglas coloré\nOeuvre clé : Untitled (stacks — piles de boîtes)\nManifeste : 'Specific Objects' (1965)\nFondation à Marfa, Texas (désert = musée)",img:"Donald Judd stacks sculpture Marfa",wiki:"Donald_Judd"},
  {s:"Art contemporain",q:"Qui est Louise Nevelson ?",a:"🇺🇸🇺🇦 Sculptrice américaine d'origine ukrainienne (1899-1988)\nMédium : sculpture (bois, assemblage)\nMurs de bois recyclé peints en noir, blanc ou or\nOeuvre clé : Sky Cathedral (1958, mur de boîtes)\nPionnière de l'installation environnementale\nToujours en cils et foulard — personnage iconique",img:"Louise Nevelson Sky Cathedral sculpture",wiki:"Louise_Nevelson"},
  {s:"Art contemporain",q:"Qui est Claes Thure Oldenburg & Coosje van Bruggen ?",a:"🇸🇪🇺🇸🇳🇱 Duo suédo-américain/néerlandais\nMédium : sculpture monumentale\nObjets du quotidien agrandis à échelle colossale\nOeuvre clé : Spoonbridge and Cherry (Minneapolis)\nÉpingle à linge, tube de dentifrice géants\nCollaboration mari/femme pendant 30 ans",img:"Oldenburg van Bruggen Spoonbridge Cherry",wiki:"Coosje_van_Bruggen"},
  {s:"Art contemporain",q:"Qui est Yoko Ono ?",a:"🇯🇵🇺🇸 Artiste japonaise-américaine (1933)\nMédium : performance, installation, musique, film\nPionnière de l'art conceptuel et Fluxus\nOeuvre clé : Cut Piece (1964, public découpe ses vêtements)\nInstruction Paintings (l'œuvre = un texte à imaginer)\nÉpouse de John Lennon, militante pour la paix",img:"Yoko Ono Cut Piece performance",wiki:"Yoko_Ono"},
  {s:"Art contemporain",q:"Qui est Maureen Paley ?",a:"🇬🇧 Galeriste britannique (1953)\nMédium : galerie d'art (pas artiste)\nPremière galerie d'art contemporain à l'est de Londres (1984)\nA lancé : Gillian Wearing, Wolfgang Tillmans, Liam Gillick\nPionnière de la scène YBA\nModèle pour les galeries indépendantes",img:"Maureen Paley gallery London",wiki:"Maureen_Paley"},
  {s:"Art contemporain",q:"Qui est Mona Marzouk ?",a:"🇪🇬 Artiste égyptienne (1972)\nMédium : peinture, installation\nCouleurs vibrantes, géométrie, architecture\nOeuvre clé : installations murales colorées\nExplore l'espace urbain et politique au Caire\nFigure clé de la scène contemporaine égyptienne",img:"Mona Marzouk painting installation",wiki:"Mona_Marzouk"},
  {s:"Art contemporain",q:"Qui est Ibrahim Mahama ?",a:"🇬🇭 Artiste ghanéen (1987)\nMédium : installation (textile, jute)\nRecouvre bâtiments de sacs de jute usagés\nOeuvre clé : Out of Bounds (Documenta 14, 2017)\nTraces du commerce, migration, travail\nFondateur de Savannah Centre for Contemporary Art (Tamale)",img:"Ibrahim Mahama jute installation Documenta",wiki:"Ibrahim_Mahama_(artist)"},
  {s:"Art contemporain",q:"Qui est Tavares Strachan ?",a:"🇧🇸🇺🇸 Artiste bahaméen-américain (1979)\nMédium : sculpture, néon, installation\nInvisibilité des héros noirs dans l'histoire\nOeuvre clé : Encyclopedia of Invisibility\nA envoyé de la glace des Bahamas à l'Arctique\nScience, exploration spatiale, mémoire",img:"Tavares Strachan neon art",wiki:"Tavares_Strachan"},
  {s:"Art contemporain",q:"Qui est Firelei Báez ?",a:"🇩🇴🇺🇸 Artiste dominicaine-américaine (1981)\nMédium : peinture, sculpture, installation\nFigures féminines noires mêlées de motifs décoratifs\nOeuvre clé : façade du Met Breuer recouverte (2024)\nDiaspora caribéenne, mythologie, résistance\nStar montante de la scène new-yorkaise",img:"Firelei Baez Met Breuer installation",wiki:"Firelei_B%C3%A1ez"},

  // ── MOUVEMENTS SUPPLÉMENTAIRES ──
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Pointillisme ?",a:"France ~1886, fondé par Seurat et Signac\nPetits points de couleur pure juxtaposés\nOeuvre fondatrice : Un dimanche après-midi à la Grande Jatte (Seurat)\nAussi appelé Néo-impressionnisme ou Divisionnisme\nBasé sur la théorie scientifique des couleurs",img:"Seurat Sunday Afternoon Grande Jatte pointillism",wiki:"Pointillisme"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Nabis ?",a:"France ~1888-1900, 'prophètes' en hébreu\nBonnard, Vuillard, Denis, Sérusier\nCouleurs plates, arabesques, intimisme\nOeuvre fondatrice : Le Talisman (Sérusier, 1888)\nPont entre impressionnisme et art moderne",img:"Paul Serusier Le Talisman Nabis",wiki:"Nabis_(peinture)"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Vorticisme ?",a:"Angleterre 1914-1915, fondé par Wyndham Lewis\nGéométrie agressive, machines, dynamisme\nInfluencé par cubisme et futurisme\nMagazine BLAST (manifeste)\nCourt mouvement interrompu par la 1re Guerre",img:"Wyndham Lewis Vorticism BLAST",wiki:"Vorticisme"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Situationnisme ?",a:"Europe 1957-1972, fondé par Guy Debord\nCritique radicale de la société du spectacle\nDérive, détournement, psychogéographie\nOeuvre clé : La Société du spectacle (Debord, 1967)\nA inspiré Mai 68 — art = révolution",img:"Guy Debord Society Spectacle situationism",wiki:"Internationale_situationniste"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Happening ?",a:"USA fin des années 1950, Allan Kaprow\nÉvénement artistique spontané, participatif\nPas de script fixe — le public fait partie de l'œuvre\nKaprow : 18 Happenings in 6 Parts (1959)\nA ouvert la voie à la performance et l'art relationnel",img:"Allan Kaprow Happening art",wiki:"Happening"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Supports/Surfaces ?",a:"France 1969-1972\nDéconstruction de la peinture : toile, châssis, couleur\nViallat (formes répétées sans châssis), Dezeuze, Cane\nToiles non tendues, teintures, cordes nouées\nMouvement théorique radical — art = ses composants",img:"Claude Viallat Supports Surfaces painting",wiki:"Supports/Surfaces"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le COBRA ?",a:"1948-1951, Copenhague-Bruxelles-Amsterdam\nExpression spontanée, couleurs violentes, enfantin\nJorn, Appel, Alechinsky, Dotremont\nOeuvre clé : Appel, Questioning Children\nRejet de toute convention — art brut + expressionnisme\nNom = initiales des 3 villes",img:"Karel Appel COBRA painting",wiki:"CoBrA"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Gutai ?",a:"Japon 1954-1972, fondé par Jirō Yoshihara\nAvant-garde radicale — le corps attaque la matière\nShiraga peint avec les pieds, Murakami traverse le papier\nOeuvre clé : Challenging Mud (Shiraga, 1955)\nPrécurseur de la performance et du happening",img:"Kazuo Shiraga Gutai mud painting",wiki:"Gutai"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que l'Orphisme ?",a:"Paris ~1912, nommé par Apollinaire\nAbstraction lyrique, cercles de couleurs simultanées\nRobert et Sonia Delaunay, Kupka\nOeuvre clé : Delaunay, Formes circulaires\nLa couleur crée la forme — musique visuelle\nPont entre cubisme et abstraction",img:"Robert Delaunay Formes Circulaires orphism",wiki:"Orphisme_(art)"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Mono-ha ?",a:"Japon fin des années 1960\n'École des choses' — matériaux bruts non transformés\nLee Ufan, Sekine Nobuo\nOeuvre clé : Sekine, Phase — Mother Earth (cylindre de terre)\nPierre, bois, métal, verre — dialogue nature/industrie\nÉquivalent japonais de l'Arte Povera",img:"Sekine Nobuo Phase Mother Earth Mono-ha",wiki:"Mono-ha"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que l'Actionnisme viennois ?",a:"Vienne, années 1960\nPerformances extrêmes : corps, sang, transgression\nMühl, Brus, Schwarzkogler, Nitsch\nOeuvre clé : Orgies Mysteries Theatre (Nitsch)\nCritique radicale de la société autrichienne\nPlusieurs artistes emprisonnés",img:"Hermann Nitsch Viennese Actionism",wiki:"Actionnisme_viennois"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Rayonnisme ?",a:"Russie 1911, fondé par Larionov et Gontcharova\nRayons de lumière et couleur en faisceaux\nOeuvre clé : Larionov, Rayonnisme rouge\nSynthèse cubisme + futurisme + orphisme\nUn des premiers mouvements abstraits russes",img:"Mikhail Larionov Rayonism painting",wiki:"Rayonnisme"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Spatialisme ?",a:"Italie 1947, fondé par Lucio Fontana\nDépasser la toile — ouvrir l'espace\nOeuvre clé : Concetto Spaziale (toiles percées/lacérées)\nManifeste Bianco (1946) : art = espace + temps\nUtilisation du néon, trous, fentes dans la toile",img:"Lucio Fontana Concetto Spaziale Spatialism",wiki:"Spatialisme"},
  {s:"Mouvements artistiques",q:"Qu'est-ce que le Lowbrow / Pop surréalisme ?",a:"Los Angeles, années 1970-80\nArt underground : BD, hot rod, punk, surf\nRobert Williams, Mark Ryden, KAWS\nMéprisé par le monde de l'art 'sérieux'\nMainstream aujourd'hui (KAWS = millions aux enchères)",img:"Mark Ryden pop surrealism lowbrow art",wiki:"Lowbrow_(mouvement_artistique)"},

  // ── PHOTOGRAPHES SUPPLÉMENTAIRES ──
  {s:"Photographie",q:"Qui est Weegee ?",a:"🇺🇸🇺🇦 Photographe américain d'origine ukrainienne (1899-1968)\nMédium : photographie de presse\nScènes de crime, incendies, vie nocturne NYC\nOeuvre clé : Naked City (1945)\nÉcoutait la radio de la police pour arriver le premier\nFlash brutal, noir et blanc cru",img:"Weegee Naked City photography",wiki:"Weegee"},
  {s:"Photographie",q:"Qui est Walker Evans ?",a:"🇺🇸 Photographe américain (1903-1975)\nMédium : photographie documentaire\nAmérique rurale pendant la Grande Dépression\nOeuvre clé : Let Us Now Praise Famous Men (avec James Agee)\nStyle frontal, objectif, sans sentimentalisme\nA influencé Friedlander, Shore, Struth",img:"Walker Evans Great Depression photography",wiki:"Walker_Evans"},
  {s:"Photographie",q:"Qui est Josef Koudelka ?",a:"🇨🇿🇫🇷 Photographe tchèque-français (1938)\nMédium : photographie N&B\nA photographié l'invasion de Prague (1968) en clandestin\nOeuvre clé : Gypsies (Roms d'Europe de l'Est)\nPanoramas de paysages dévastés\nNomade — a dormi dehors pendant 20 ans",img:"Josef Koudelka Prague invasion photography",wiki:"Josef_Koudelka"},
  {s:"Photographie",q:"Qui est Alec Soth ?",a:"🇺🇸 Photographe américain (1969)\nMédium : photographie grand format couleur\nRoad trips à travers l'Amérique profonde\nOeuvre clé : Sleeping by the Mississippi (2004)\nPortraits et paysages poétiques, marginaux\nMembre de Magnum",img:"Alec Soth Sleeping Mississippi photography",wiki:"Alec_Soth"},
  {s:"Photographie",q:"Qui est Berenice Abbott ?",a:"🇺🇸 Photographe américaine (1898-1991)\nMédium : photographie documentaire\nA documenté le New York des années 1930 en transformation\nOeuvre clé : Changing New York (1935-39)\nA sauvé les archives d'Eugène Atget\nPionnière de la photographie scientifique",img:"Berenice Abbott Changing New York photography",wiki:"Berenice_Abbott"},
  {s:"Photographie",q:"Qui est Nobuyoshi Araki ?",a:"🇯🇵 Photographe japonais (1940)\nMédium : photographie\nÉrotisme, fleurs, Tokyo — prolifique (500+ livres)\nOeuvre clé : Sentimental Journey (lune de miel)\nFrontière art/pornographie\nPolémique #MeToo — rapport problématique aux modèles",img:"Nobuyoshi Araki flowers bondage photography",wiki:"Nobuyoshi_Araki"},
  {s:"Photographie",q:"Qui est Edward Steichen ?",a:"🇺🇸🇱🇺 Photographe américano-luxembourgeois (1879-1973)\nMédium : photographie, peinture\nPionnier de la photo de mode (Vogue, Vanity Fair)\nOeuvre clé : The Family of Man (expo au MoMA, 1955)\n503 photos de 68 pays — expo la plus vue de l'histoire\nDirecteur photo du MoMA pendant 15 ans",img:"Edward Steichen Family of Man exhibition",wiki:"Edward_Steichen"},
  {s:"Photographie",q:"Qui est Alfred Stieglitz ?",a:"🇺🇸 Photographe américain (1864-1946)\nMédium : photographie\nA imposé la photo comme art aux USA\nOeuvre clé : The Steerage (1907)\nGalerie 291 à New York — premier espace photo = art\nÉpoux de Georgia O'Keeffe",img:"Alfred Stieglitz The Steerage photography",wiki:"Alfred_Stieglitz"},
  {s:"Photographie",q:"Qui est Cindy Sherman ?",a:"🇺🇸 Photographe américaine (1954)\nMédium : photographie\nSe photographie déguisée en stéréotypes féminins\nOeuvre clé : Untitled Film Stills (1977-80)\nCritique la représentation des femmes dans les médias\nRecord : 3,89 M$",img:"Cindy Sherman Untitled Film Stills",wiki:"Cindy_Sherman"},
  {s:"Photographie",q:"Qui est Larry Clark ?",a:"🇺🇸 Photographe et cinéaste américain (1943)\nMédium : photographie, film\nJeunesse marginale : drogue, sexe, violence\nOeuvre clé : Tulsa (1971, livre culte)\nFilm Kids (1995)\nRegard sans filtre sur l'adolescence américaine",img:"Larry Clark Tulsa photography",wiki:"Larry_Clark"},
  {s:"Photographie",q:"Qui est Guy Bourdin ?",a:"🇫🇷 Photographe français (1928-1991)\nMédium : photographie de mode\nImages surréalistes, érotiques et morbides pour Vogue\nOeuvre clé : campagnes Charles Jourdan (chaussures)\nCouleurs saturées, mises en scène provocantes\nA révolutionné la photo publicitaire",img:"Guy Bourdin Charles Jourdan photography",wiki:"Guy_Bourdin"},
  {s:"Photographie",q:"Qui est Mary Ellen Mark ?",a:"🇺🇸 Photographe américaine (1940-2015)\nMédium : photographie documentaire\nMarginaux, cirques, hôpitaux psychiatriques\nOeuvre clé : Ward 81 (hôpital psy pour femmes)\nFalkland Road (prostituées de Bombay)\nEmpathie et dignité — 40 ans de reportage",img:"Mary Ellen Mark Ward 81 photography",wiki:"Mary_Ellen_Mark"},
  {s:"Photographie",q:"Qui est Gordon Parks ?",a:"🇺🇸 Photographe américain (1912-2006)\nMédium : photographie, film, musique, littérature\nPremier photographe noir de Life Magazine\nOeuvre clé : American Gothic (1942, femme de ménage)\nFilm Shaft (1971) — blaxploitation\nArme de choix contre le racisme = son appareil photo",img:"Gordon Parks American Gothic photography",wiki:"Gordon_Parks"},
  {s:"Photographie",q:"Qui est Saul Leiter ?",a:"🇺🇸 Photographe américain (1923-2013)\nMédium : photographie couleur\nPionnier méconnu de la photo couleur (années 1950)\nOeuvre clé : photos de rue à travers vitrines et reflets\nRedécouvert tardivement (années 2000)\nPeintre autant que photographe",img:"Saul Leiter color street photography",wiki:"Saul_Leiter"},
  {s:"Photographie",q:"Qui est Herb Ritts ?",a:"🇺🇸 Photographe américain (1952-2002)\nMédium : photographie de mode et portrait\nCorps sculptés en lumière naturelle californienne\nOeuvre clé : portraits de Madonna, Naomi Campbell\nN&B solaire, esthétique grecque moderne\nMort du sida à 50 ans",img:"Herb Ritts photography Madonna",wiki:"Herb_Ritts"},
  {s:"Photographie",q:"Qui est Marcos López ?",a:"🇦🇷 Photographe argentin (1958)\nMédium : photographie couleur mise en scène\nPop art latino : kitsch, politique, identité\nOeuvre clé : Sub-realismo criollo (série)\nCouleurs saturées, humour, critique sociale\nFigure majeure de la photo latino-américaine",img:"Marcos Lopez Sub-realismo criollo",wiki:"Marcos_L%C3%B3pez"},
  {s:"Photographie",q:"Qui est Shirin Neshat ?",a:"🇮🇷 Artiste et photographe iranienne (1957)\nMédium : photographie, vidéo, film\nPhotos N&B avec calligraphie persane sur la peau\nOeuvre clé : Women of Allah (1993-97)\nExil, identité, genre en Islam\nLion d'Or Venise 2009",img:"Shirin Neshat Women of Allah calligraphy",wiki:"Shirin_Neshat"},
  {s:"Photographie",q:"Qui est Juergen Teller ?",a:"🇩🇪 Photographe allemand (1964)\nMédium : photographie de mode\nAnti-glamour : flash direct, pas de retouche\nOeuvre clé : campagnes Marc Jacobs, Céline\nSe photographie nu avec des célébrités\nA cassé les codes de la photo de mode",img:"Juergen Teller photography fashion",wiki:"Juergen_Teller"},
  {s:"Photographie",q:"Qui est Francesca Woodman ?",a:"🇺🇸 Photographe américaine (1958-1981)\nMédium : photographie N&B\nAutoportraits fantomatiques — corps en mouvement, flou\nOeuvre clé : séries Providence et Rome\nRedécouverte posthume — culte\nSuicide à 22 ans — seulement 800 photos",img:"Francesca Woodman self portrait photography",wiki:"Francesca_Woodman"},
  {s:"Photographie",q:"Qui est Roger Ballen ?",a:"🇺🇸🇿🇦 Photographe américano-sud-africain (1950)\nMédium : photographie N&B\nUnivers cauchemardesque : fils, dessins, animaux\nOeuvre clé : Asylum of the Birds (2014)\nInfluencé par l'art brut et Roger Corman\nVit en Afrique du Sud depuis 1982",img:"Roger Ballen Asylum Birds photography",wiki:"Roger_Ballen"},
];

let cards = [];
let filtered = [];
let idx = 0;
let currentSubject = 'Tous';

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    cards = JSON.parse(saved);
  } else {
    cards = [...DEFAULT_CARDS];
    save();
  }
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); }

function getSubjects() {
  return [...new Set(cards.map(c => c.s))].sort();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderSubjects() {
  const el = document.getElementById('subjects');
  const subjects = getSubjects();
  el.innerHTML = '<button class="' + (currentSubject === 'Tous' ? 'active' : '') + '" onclick="filterBy(\'Tous\')">Tous</button>';
  subjects.forEach(s => {
    el.innerHTML += '<button class="' + (currentSubject === s ? 'active' : '') + '" onclick="filterBy(\'' + s.replace(/'/g, "\\'") + '\')">' + s + '</button>';
  });
  const dl = document.getElementById('subject-list');
  dl.innerHTML = subjects.map(s => '<option value="' + s + '">').join('');
}

function filterBy(subject) {
  currentSubject = subject;
  filtered = subject === 'Tous' ? [...cards] : cards.filter(c => c.s === subject);
  shuffleArray(filtered);
  idx = 0;
  renderSubjects();
  showCard();
}

function showCard() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  const imgBtn = document.getElementById('see-work-btn');
  const wikiBtn = document.getElementById('wiki-btn');
  if (filtered.length === 0) {
    document.getElementById('front-text').textContent = 'Aucune carte';
    document.getElementById('back-text').innerHTML = '';
    document.getElementById('counter').textContent = '0 / 0';
    imgBtn.style.display = 'none';
    wikiBtn.style.display = 'none';
    return;
  }
  const c = filtered[idx];
  document.getElementById('front-text').textContent = c.q;
  // Format answer as bullet points
  const lines = c.a.split('\n').filter(l => l.trim());
  const html = '<ul>' + lines.map(l => '<li>' + l.replace(/</g,'&lt;') + '</li>').join('') + '</ul>';
  document.getElementById('back-text').innerHTML = html;
  document.getElementById('counter').textContent = (idx + 1) + ' / ' + filtered.length;
  if (c.img) {
    imgBtn.href = 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent(c.img);
    imgBtn.style.display = 'inline-block';
  } else { imgBtn.style.display = 'none'; }
  if (c.wiki) {
    wikiBtn.href = 'https://fr.wikipedia.org/wiki/' + c.wiki;
    wikiBtn.style.display = 'inline-block';
  } else { wikiBtn.style.display = 'none'; }
}

function handleCardClick(e) {
  if (e.target.closest('.card-link')) return;
  flip();
}

function flip() { document.getElementById('card').classList.toggle('flipped'); }

function next() {
  if (filtered.length === 0) return;
  idx = (idx + 1) % filtered.length;
  showCard();
}

function prev() {
  if (filtered.length === 0) return;
  idx = (idx - 1 + filtered.length) % filtered.length;
  showCard();
}


function openAdd() { document.getElementById('add-modal').classList.add('open'); }
function closeAdd() { document.getElementById('add-modal').classList.remove('open'); }

function saveCard() {
  const s = document.getElementById('new-subject').value.trim();
  const q = document.getElementById('new-question').value.trim();
  const a = document.getElementById('new-answer').value.trim();
  const img = document.getElementById('new-img').value.trim();
  const wiki = document.getElementById('new-wiki').value.trim();
  if (!s || !q || !a) return alert('Remplis sujet, question et réponse.');
  const card = {s, q, a};
  if (img) card.img = img;
  if (wiki) card.wiki = wiki;
  cards.push(card);
  save();
  document.getElementById('new-subject').value = '';
  document.getElementById('new-question').value = '';
  document.getElementById('new-answer').value = '';
  document.getElementById('new-img').value = '';
  document.getElementById('new-wiki').value = '';
  closeAdd();
  filterBy(currentSubject);
}

function deleteCard() {
  if (filtered.length === 0) return;
  const c = filtered[idx];
  if (!confirm('Supprimer cette carte ?')) return;
  const ci = cards.indexOf(c);
  if (ci > -1) cards.splice(ci, 1);
  save();
  filterBy(currentSubject);
}

function resetCards() {
  if (!confirm('Réinitialiser ? Tes cartes perso seront perdues.')) return;
  localStorage.removeItem(STORAGE_KEY);
  cards = [...DEFAULT_CARDS];
  save();
  filterBy('Tous');
}

function openImportExport() {
  document.getElementById('ie-data').value = '';
  document.getElementById('ie-modal').classList.add('open');
}
function closeIE() { document.getElementById('ie-modal').classList.remove('open'); }

function exportData() {
  document.getElementById('ie-data').value = JSON.stringify(cards, null, 2);
}

function importData() {
  try {
    const data = JSON.parse(document.getElementById('ie-data').value);
    if (!Array.isArray(data)) throw new Error();
    let count = 0;
    data.forEach(c => { if (c.s && c.q && c.a) { cards.push(c); count++; } });
    save();
    filterBy(currentSubject);
    closeIE();
    alert(count + ' cartes importées !');
  } catch(e) { alert('JSON invalide.'); }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (document.querySelector('.modal-overlay.open')) return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});

// Init — always shuffled
load();
filterBy('Tous');
</script>
